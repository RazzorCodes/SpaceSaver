version: "3.8"
name: spacesaver-local

services:
  spacesaver-transcode:
    build:
      context: ../transcoder/app
      dockerfile: ../containerfile/spacesaver-transcode
    container_name: spacesaver-transcode
    ports:
      - "8000:8000"
    volumes:
      - ../transcoder/app:/storage/spacesaver-transcode:Z
      - ${MEDIA_DIR:-/home/andrei/Videos}:/media:Z
    environment:
      - PYTHONPATH=/app/src
    restart: unless-stopped

  spyglass:
    build:
      context: ../spyglass
      dockerfile: ../spyglass/containerfiles/Containerfile
    container_name: spyglass
    ports:
      - "5000:5000"
    environment:
      - TRANSCODER_URL=http://spacesaver-transcode:8000
    depends_on:
      - spacesaver-transcode
    restart: unless-stopped
